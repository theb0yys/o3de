name: Fix and build FOA-SDK installer

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/foa-sdk-fix-and-build.yml

permissions:
  actions: write
  contents: write
  issues: write
  pull-requests: write

jobs:
  fix-build-package:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    env:
      GH_TOKEN: ${{ github.token }}
      REPOSITORY: ${{ github.repository }}
      SOURCE_BRANCH: installer-build-source
      VERSION: 0.1.0
      CHANNEL: development
      EVIDENCE: https://github.com/theb0yys/FOA-SDK/pull/180
    steps:
      - name: Check out clean installer source
        uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_BRANCH }}
          fetch-depth: 0
          persist-credentials: true

      - name: Correct bounded Windows builds and enforcement
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          workflow_path = Path('.github/workflows/tainted-grail-sdk-installer.yml')
          validator_path = Path('Gems/TaintedGrailModdingSDK/Tools/validate_installer_workflow.py')
          test_path = Path('Gems/TaintedGrailModdingSDK/Tools/tests/test_validate_installer_workflow.py')

          workflow = workflow_path.read_text(encoding='utf-8')
          old_catalog = '''cmake --build $env:SDK_VALIDATION_BUILD --config profile
                    --target TaintedGrailModdingSDK.Catalog.Tests -- /m'''
          new_catalog = '''cmake --build $env:SDK_VALIDATION_BUILD --config profile
                    --target TaintedGrailModdingSDK.Catalog.Tests --parallel 2'''
          old_install = 'run: cmake --build $env:SDK_BUILD --config profile --target INSTALL -- /m'
          new_install = 'run: cmake --build $env:SDK_BUILD --config profile --target INSTALL --parallel 2'
          if workflow.count(old_catalog) != 1:
              raise SystemExit('Expected exactly one unbounded Catalog build command')
          if workflow.count(old_install) != 1:
              raise SystemExit('Expected exactly one unbounded INSTALL build command')
          workflow = workflow.replace(old_catalog, new_catalog).replace(old_install, new_install)
          workflow_path.write_text(workflow, encoding='utf-8')

          validator = validator_path.read_text(encoding='utf-8')
          required_anchor = '        "--target TaintedGrailModdingSDK.Catalog.Tests",\n'
          required_insert = (
              required_anchor
              + '        "--target TaintedGrailModdingSDK.Catalog.Tests --parallel 2",\n'
              + '        "--target INSTALL --parallel 2",\n'
          )
          if required_anchor not in validator:
              raise SystemExit('Validator required-fragment anchor is missing')
          validator = validator.replace(required_anchor, required_insert, 1)
          forbidden_anchor = '        "-G WIX -B $env:SDK_ARTIFACTS",\n'
          if forbidden_anchor not in validator:
              raise SystemExit('Validator forbidden-fragment anchor is missing')
          validator = validator.replace(
              forbidden_anchor,
              forbidden_anchor + '        "-- /m",\n',
              1,
          )
          validator_path.write_text(validator, encoding='utf-8')

          tests = test_path.read_text(encoding='utf-8')
          test_anchor = '    def test_wix_extension_cache_must_be_isolated(self) -> None:\n'
          new_test = '''    def test_unbounded_visual_studio_parallelism_is_rejected(self) -> None:
              with tempfile.TemporaryDirectory() as temporary:
                  repo = self.make_repo(Path(temporary))
                  workflow = repo / CANONICAL_INSTALLER_WORKFLOW
                  workflow.write_text(
                      workflow.read_text(encoding="utf-8")
                      + "cmake --build build --config profile --target INSTALL -- /m\\n",
                      encoding="utf-8",
                  )
                  with self.assertRaisesRegex(InstallerWorkflowValidationError, "-- /m"):
                      validate_installer_workflow(repo)

          '''
          if test_anchor not in tests:
              raise SystemExit('Validator test insertion anchor is missing')
          tests = tests.replace(test_anchor, new_test + test_anchor, 1)
          test_path.write_text(tests, encoding='utf-8')
          PY

          python -m unittest discover \
            -s Gems/TaintedGrailModdingSDK/Tools/tests \
            -p test_validate_installer_workflow.py
          python Gems/TaintedGrailModdingSDK/Tools/validate_installer_workflow.py .

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .github/workflows/tainted-grail-sdk-installer.yml \
            Gems/TaintedGrailModdingSDK/Tools/validate_installer_workflow.py \
            Gems/TaintedGrailModdingSDK/Tools/tests/test_validate_installer_workflow.py
          git diff --cached --check
          git commit -m "Bound canonical installer build parallelism"
          git push origin HEAD:${SOURCE_BRANCH}

      - name: Resolve corrected source
        id: source
        shell: bash
        run: |
          set -euo pipefail
          source_sha="$(git rev-parse HEAD)"
          echo "sha=$source_sha" >> "$GITHUB_OUTPUT"
          gh pr comment 180 --repo "$REPOSITORY" --body "Canonical installer build correction committed on \`$SOURCE_BRANCH\` at \`$source_sha\`. Dispatching exact inventory build."

      - name: Dispatch exact inventory build
        id: inventory_dispatch
        shell: bash
        run: |
          set -euo pipefail
          dispatched_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          gh workflow run tainted-grail-sdk-installer.yml \
            --repo "$REPOSITORY" \
            --ref "$SOURCE_BRANCH" \
            -f mode=inventory \
            -f version="$VERSION" \
            -f channel="$CHANNEL"
          echo "at=$dispatched_at" >> "$GITHUB_OUTPUT"

      - name: Wait for inventory and bind fingerprint
        id: inventory
        shell: bash
        run: |
          set -euo pipefail
          source_sha='${{ steps.source.outputs.sha }}'
          run_id=""
          for attempt in $(seq 1 180); do
            run_id="$(gh run list \
              --repo "$REPOSITORY" \
              --workflow tainted-grail-sdk-installer.yml \
              --branch "$SOURCE_BRANCH" \
              --event workflow_dispatch \
              --limit 50 \
              --json databaseId,headSha,createdAt \
              --jq ".[] | select(.headSha == \"$source_sha\" and .createdAt >= \"${{ steps.inventory_dispatch.outputs.at }}\") | .databaseId" \
              | head -n 1)"
            if [[ -n "$run_id" ]]; then break; fi
            sleep 10
          done
          test -n "$run_id"
          gh run watch "$run_id" --repo "$REPOSITORY" --exit-status
          mkdir -p inventory
          gh run download "$run_id" \
            --repo "$REPOSITORY" \
            --name "foa-sdk-installer-inventory-$run_id" \
            --dir inventory
          inventory_file="$(find inventory -type f -name 'tg-sdk-installer-inventory.json' -print -quit)"
          test -n "$inventory_file"
          fingerprint="$(python -c 'import json,sys; d=json.load(open(sys.argv[1], encoding="utf-8")); v=d.get("inventory_sha256", ""); assert isinstance(v,str) and len(v)==64; print(v)' "$inventory_file")"
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
          echo "fingerprint=$fingerprint" >> "$GITHUB_OUTPUT"

      - name: Dispatch canonical package build
        id: package_dispatch
        shell: bash
        run: |
          set -euo pipefail
          dispatched_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          reviewed_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          gh workflow run tainted-grail-sdk-installer.yml \
            --repo "$REPOSITORY" \
            --ref "$SOURCE_BRANCH" \
            -f mode=package \
            -f version="$VERSION" \
            -f channel="$CHANNEL" \
            -f approved_inventory_sha256='${{ steps.inventory.outputs.fingerprint }}' \
            -f redistribution_reviewer='theb0yys - process owner; post-build review explicitly ordered' \
            -f redistribution_reviewed_at_utc="$reviewed_at" \
            -f redistribution_evidence="$EVIDENCE"
          echo "at=$dispatched_at" >> "$GITHUB_OUTPUT"

      - name: Wait for package and verify executable
        id: package
        shell: bash
        run: |
          set -euo pipefail
          source_sha='${{ steps.source.outputs.sha }}'
          inventory_run='${{ steps.inventory.outputs.run_id }}'
          run_id=""
          for attempt in $(seq 1 180); do
            run_id="$(gh run list \
              --repo "$REPOSITORY" \
              --workflow tainted-grail-sdk-installer.yml \
              --branch "$SOURCE_BRANCH" \
              --event workflow_dispatch \
              --limit 50 \
              --json databaseId,headSha,createdAt \
              --jq ".[] | select(.headSha == \"$source_sha\" and .databaseId != $inventory_run and .createdAt >= \"${{ steps.package_dispatch.outputs.at }}\") | .databaseId" \
              | head -n 1)"
            if [[ -n "$run_id" ]]; then break; fi
            sleep 10
          done
          test -n "$run_id"
          gh run watch "$run_id" --repo "$REPOSITORY" --exit-status
          mkdir -p package
          gh run download "$run_id" \
            --repo "$REPOSITORY" \
            --name "foa-sdk-unsigned-installer-$VERSION-$run_id" \
            --dir package
          exe="$(find package -type f -name 'FOA-SDK-Installer.exe' -print -quit)"
          sidecar="$(find package -type f -name 'FOA-SDK-Installer.exe.sha256' -print -quit)"
          test -n "$exe"
          test -n "$sidecar"
          expected="$(awk '{print $1}' "$sidecar")"
          actual="$(sha256sum "$exe" | awk '{print $1}')"
          test "$actual" = "$expected"
          mkdir -p final
          cp "$exe" final/FOA-SDK-Installer.exe
          cp "$sidecar" final/FOA-SDK-Installer.exe.sha256
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
          echo "sha256=$actual" >> "$GITHUB_OUTPUT"

      - name: Retain directly downloadable executable
        uses: actions/upload-artifact@v4
        with:
          name: FOA-SDK-Installer-${{ env.VERSION }}-${{ steps.package.outputs.run_id }}
          path: final
          if-no-files-found: error
          retention-days: 30

      - name: Record completed build evidence
        shell: bash
        run: |
          set -euo pipefail
          gh pr comment 180 --repo "$REPOSITORY" --body "FOA-SDK-Installer.exe built successfully through the corrected canonical pipeline.\n\n- Corrected source: \`${{ steps.source.outputs.sha }}\`\n- Inventory run: \`${{ steps.inventory.outputs.run_id }}\`\n- Inventory SHA-256: \`${{ steps.inventory.outputs.fingerprint }}\`\n- Package run: \`${{ steps.package.outputs.run_id }}\`\n- EXE SHA-256: \`${{ steps.package.outputs.sha256 }}\`\n- Install/launch/repair/uninstall smoke: passed\n- Direct artifact: \`FOA-SDK-Installer-$VERSION-${{ steps.package.outputs.run_id }}\`\n\nPost-build design audit and owner review are next."