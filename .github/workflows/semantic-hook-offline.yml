name: Semantic Hook Offline Suite

on:
  pull_request:
    paths:
      - ".github/workflows/semantic-hook-offline.yml"
      - "scripts/tainted_grail/**"
      - "docs/tainted-grail-modding/hooks/BATCH_012.md"
      - "docs/tainted-grail-modding/hooks/README.md"
  push:
    paths:
      - ".github/workflows/semantic-hook-offline.yml"
      - "scripts/tainted_grail/**"
      - "docs/tainted-grail-modding/hooks/BATCH_012.md"
      - "docs/tainted-grail-modding/hooks/README.md"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: semantic-hook-offline-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  offline-tests:
    name: Python ${{ matrix.python-version }} offline tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile offline modules
        run: python -m compileall -q scripts/tainted_grail
      - name: Enforce workflow authority boundary
        run: python -m unittest discover -s scripts/tainted_grail -p 'test_ci_workflow_policy.py' -v
      - name: Verify reproducible workflow policy receipt
        run: python -m unittest discover -s scripts/tainted_grail -p 'test_ci_policy_receipt.py' -v
      - name: Verify cross-version policy receipt
        run: python -m unittest discover -s scripts/tainted_grail -p 'test_ci_cross_version_receipts.py' -v
      - name: Verify workflow receipt migrations
        run: python -m unittest discover -s scripts/tainted_grail -p 'test_ci_receipt_migration.py' -v
      - name: Verify workflow receipt migration histories
        run: python -m unittest discover -s scripts/tainted_grail -p 'test_ci_migration_history.py' -v
      - name: Run offline suite
        run: python -m unittest discover -s scripts/tainted_grail -p 'test_*.py' -v
