name: Tainted Grail SDK PR Static Validation

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - "Gems/TaintedGrailModdingSDK/**"
      - "Gems/ExternalToolchain/**"
      - "Installer/**"
      - "Plugins/**"
      - "Research/**"
      - "TaintedGrailModdingEditor/**"
      - "docs/tainted-grail-sdk/**"
      - "scripts/commit_validation/**"
      - "*.md"
      - ".gitattributes"
      - "o3de.lock.json"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "Gems/TaintedGrailModdingSDK/**"
      - "Gems/ExternalToolchain/**"
      - "Installer/**"
      - "Plugins/**"
      - "Research/**"
      - "TaintedGrailModdingEditor/**"
      - "docs/tainted-grail-sdk/**"
      - "scripts/commit_validation/**"
      - "*.md"
      - ".gitattributes"
      - "o3de.lock.json"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tg-sdk-static-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  static-validation:
    name: Python, validators, and fixtures
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out exact workflow commit
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Record exact repair tree
        shell: bash
        run: git rev-parse 'HEAD^{tree}' > tg-sdk-validation-repair-tree.txt

      - name: Preserve validation repair sources
        uses: actions/upload-artifact@v4
        with:
          name: tg-sdk-validation-repair-sources-${{ github.run_id }}
          path: |
            tg-sdk-validation-repair-tree.txt
            .gitattributes
            .github/workflows/tainted-grail-sdk-pr-validation.yml
            .github/workflows/tainted-grail-sdk-foundation.yml
            Gems/TaintedGrailModdingSDK/Tools/validate_catalog_schema2.py
            Gems/TaintedGrailModdingSDK/Tools/tests/test_validate_catalog_schema2.py
            docs/tainted-grail-sdk/ACTOR_TROOP_EDITOR_DESIGN.md
            docs/tainted-grail-sdk/DEVELOPER_PREVIEW_0.md
          if-no-files-found: error
          retention-days: 1

      - name: Run non-compiled TG SDK validation layer
        shell: bash
        run: |
          set -o pipefail
          python Gems/TaintedGrailModdingSDK/Tools/run_local_validation.py --keep-going --static-only --skip-source-policy 2>&1 | tee tg-sdk-static-validation.log

      - name: Preserve exact-run validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tg-sdk-static-validation-${{ github.run_id }}
          path: tg-sdk-static-validation.log
          if-no-files-found: error
          retention-days: 7
