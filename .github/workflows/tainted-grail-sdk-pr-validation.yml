name: Tainted Grail SDK PR Static Validation

on:
  push:
    branches:
      - agent/full-review-remediation
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tg-sdk-remediation-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply-remediation:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out remediation branch
        uses: actions/checkout@v4
        with:
          ref: agent/full-review-remediation
          fetch-depth: 0
          persist-credentials: true

      - name: Apply exact candidate-evidence repairs
        shell: bash
        run: |
          set -euo pipefail
          python .github/remediation/apply_candidate_evidence_repairs.py
          git diff --check
          python -m unittest discover \
            -s Gems/TaintedGrailModdingSDK/Tools/tests \
            -p 'test_validate_pr_obligations.py' -v

      - name: Restore read-only workflow and publish repair
        shell: bash
        run: |
          set -euo pipefail
          cp .github/remediation/final_pr_validation.yml \
            .github/workflows/tainted-grail-sdk-pr-validation.yml
          rm .github/remediation/final_pr_validation.yml
          rm .github/remediation/apply_candidate_evidence_repairs.py
          rm .github/workflows/apply-full-review-candidate-repairs.yml
          rmdir .github/remediation 2>/dev/null || true
          git add -A
          git diff --cached --check
          git config user.name 'FOA-SDK Remediation Bot'
          git config user.email '264552926+theb0yys@users.noreply.github.com'
          git commit -s -m 'Wire candidate evidence through public API'
          git push origin HEAD:agent/full-review-remediation
