name: Tainted Grail SDK PR Static Validation

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - edited
      - ready_for_review
      - converted_to_draft
    paths:
      - ".github/**"
      - "Gems/TaintedGrailModdingSDK/**"
      - "Gems/ExternalToolchain/**"
      - "Installer/**"
      - "Plugins/**"
      - "Research/**"
      - "TaintedGrailModdingEditor/**"
      - "docs/**"
      - "scripts/**"
      - "*.md"
      - ".gitattributes"
      - "o3de.lock.json"
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - edited
      - ready_for_review
      - auto_merge_enabled
  push:
    branches:
      - main
    paths:
      - ".github/**"
      - "Gems/TaintedGrailModdingSDK/**"
      - "Gems/ExternalToolchain/**"
      - "Installer/**"
      - "Plugins/**"
      - "Research/**"
      - "TaintedGrailModdingEditor/**"
      - "docs/**"
      - "scripts/**"
      - "*.md"
      - ".gitattributes"
      - "o3de.lock.json"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tg-sdk-static-${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  enforce-obligations:
    name: Enforce ready-PR obligations
    if: github.event_name == 'pull_request_target' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Check out trusted base policy
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate exact-head obligations or return PR to draft
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PULL_REQUEST_NODE_ID: ${{ github.event.pull_request.node_id }}
        run: |
          set +e
          python Gems/TaintedGrailModdingSDK/Tools/validate_pr_obligations.py \
            --event "$GITHUB_EVENT_PATH"
          validation_status=$?
          set -e

          if [[ $validation_status -eq 0 ]]; then
            exit 0
          fi

          gh api graphql \
            -f query='mutation($id:ID!){convertPullRequestToDraft(input:{pullRequestId:$id}){pullRequest{isDraft}}}' \
            -f id="$PULL_REQUEST_NODE_ID"
          echo "Incomplete or stale merge obligations returned the pull request to draft." >&2
          exit "$validation_status"

  static-validation:
    name: Python, validators, and fixtures
    if: github.event_name != 'pull_request_target'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Check out exact pull-request head
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
          fetch-depth: 0
          lfs: true

      - name: Check out exact non-PR commit
        if: github.event_name != 'pull_request'
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate mandatory merge obligations
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          python Gems/TaintedGrailModdingSDK/Tools/validate_pr_obligations.py --event "$GITHUB_EVENT_PATH"

      - name: Verify exact reviewed range
        shell: bash
        env:
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail
          : > tg-sdk-reviewed-range.log
          head_sha="$(git rev-parse HEAD)"

          case "$GITHUB_EVENT_NAME" in
            pull_request)
              base_sha="$PR_BASE_SHA"
              expected_head_sha="$PR_HEAD_SHA"
              ;;
            push)
              base_sha="$PUSH_BEFORE_SHA"
              expected_head_sha="$GITHUB_SHA"
              ;;
            workflow_dispatch)
              base_sha="$(git rev-parse HEAD^)"
              expected_head_sha="$GITHUB_SHA"
              ;;
            *)
              echo "Unsupported reviewed-range event: $GITHUB_EVENT_NAME" >&2
              exit 1
              ;;
          esac

          if [[ ! "$base_sha" =~ ^[0-9a-f]{40}$ || ! "$head_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Reviewed range requires full base and head SHAs." >&2
            exit 1
          fi
          if [[ "$head_sha" != "$expected_head_sha" ]]; then
            echo "Checked-out head $head_sha differs from event head $expected_head_sha." >&2
            exit 1
          fi

          git cat-file -e "${base_sha}^{commit}"
          git diff --check "$base_sha" "$head_sha" 2>&1 | tee tg-sdk-reviewed-range.log
          printf 'event=%s\nbase=%s\nhead=%s\n' \
            "$GITHUB_EVENT_NAME" "$base_sha" "$head_sha" \
            > tg-sdk-reviewed-range.txt

      - name: Validate merge-obligation policy contract
        shell: bash
        run: |
          python Gems/TaintedGrailModdingSDK/Tools/validate_pr_obligation_policy.py

      - name: Run non-compiled TG SDK validation layer
        shell: bash
        run: |
          set -o pipefail
          python Gems/TaintedGrailModdingSDK/Tools/run_local_validation.py --keep-going --static-only --skip-source-policy 2>&1 | tee tg-sdk-static-validation.log

      - name: Run Suite Wizard native graphical smoke
        if: ${{ hashFiles('Installer/SuiteWizard/Host/Source/suite_wizard_host.py') != '' }}
        shell: bash
        run: |
          set -o pipefail
          command -v xvfb-run
          python -c "import tkinter; print(f'Tk {tkinter.TkVersion}')"
          xvfb-run -a python Installer/SuiteWizard/Host/Source/suite_wizard_host.py --installer-root Installer --smoke-test 2>&1 | tee -a tg-sdk-static-validation.log

      - name: Preserve exact-run validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tg-sdk-static-validation-${{ github.run_id }}
          path: |
            tg-sdk-static-validation.log
            tg-sdk-reviewed-range.log
            tg-sdk-reviewed-range.txt
          if-no-files-found: error
          retention-days: 7
