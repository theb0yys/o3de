name: Tainted Grail SDK PR Static Validation

on:
  pull_request:
  push:
    branches:
      - agent/harden-validation-pipeline
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tg-sdk-residual-repair-${{ github.ref }}
  cancel-in-progress: false

jobs:
  repair:
    name: Repair residual population status contracts
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out exact PR branch
        uses: actions/checkout@v4
        with:
          ref: agent/harden-validation-pipeline
          persist-credentials: true
          fetch-depth: 0
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply, validate, restore workflow, and push
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "FOA-SDK Validation Repair"
          git config user.email "264552926+theb0yys@users.noreply.github.com"

          python - <<'PY'
          from pathlib import Path

          validator = Path("Gems/TaintedGrailModdingSDK/Tools/validate_population_actor_troop_editor.py")
          text = validator.read_text(encoding="utf-8")
          old = '''    design = read_text(repo_root / "docs/tainted-grail-sdk/ACTOR_TROOP_EDITOR_DESIGN.md")
              require_fragments(
                  design,
                  (
                      "6. **Complete** \\u2014 immutable population action-lane derivation",
                      "7. **Next** \\u2014 deterministic synthetic population fixture",
                      "independently tracked actor, troop, and unstaged-member drafts",
                      "exact-head compiled test run",
                      "Windows UI review",
                  ),
                  "Actor/Troop implementation status",
              )'''.replace("              ", "")
          new = '''    design = read_text(repo_root / "docs/tainted-grail-sdk/ACTOR_TROOP_EDITOR_DESIGN.md")
              require_fragments(
                  design,
                  (
                      "Status: implemented vertical slice",
                      "6. **Complete** \\u2014 immutable population action-lane derivation",
                      "7. **Complete** \\u2014 deterministic synthetic population fixture",
                      "8. **Complete** \\u2014 public user, architecture/data-format, release-readiness",
                      "9. **Active acceptance gate** \\u2014 exact-head O3DE configure/build",
                      "independently tracked actor, troop, and unstaged-member drafts",
                      "compiled tests have run in an exact-head configured build",
                      "Windows UI evidence exists",
                  ),
                  "Actor/Troop implementation status",
              )
              reject_fragments(
                  design,
                  (
                      "Status: active implementation",
                      "7. **Next** \\u2014 deterministic synthetic population fixture",
                      "twenty-three-pane checklist",
                  ),
                  "Actor/Troop implementation status",
              )'''.replace("              ", "")
          if old not in text:
              raise SystemExit("population editor validator status block changed unexpectedly")
          validator.write_text(text.replace(old, new, 1), encoding="utf-8")

          tests = Path("Gems/TaintedGrailModdingSDK/Tools/tests/test_validate_population_actor_troop_editor.py")
          text = tests.read_text(encoding="utf-8")
          old = '''        self._write(
              "docs/tainted-grail-sdk/ACTOR_TROOP_EDITOR_DESIGN.md",
              "6. **Complete** \\u2014 immutable population action-lane derivation\\n"
              "7. **Next** \\u2014 deterministic synthetic population fixture\\n"
              "independently tracked actor, troop, and unstaged-member drafts\\n"
              "exact-head compiled test run\\nWindows UI review\\n",
          )'''.replace("          ", "")
          new = '''        self._write(
              "docs/tainted-grail-sdk/ACTOR_TROOP_EDITOR_DESIGN.md",
              "Status: implemented vertical slice\\n"
              "6. **Complete** \\u2014 immutable population action-lane derivation\\n"
              "7. **Complete** \\u2014 deterministic synthetic population fixture and full vertical-slice local-validation integration\\n"
              "8. **Complete** \\u2014 public user, architecture/data-format, release-readiness documentation and twenty-four-pane checklist\\n"
              "9. **Active acceptance gate** \\u2014 exact-head O3DE configure/build, compiled Catalog tests, and Windows UI evidence\\n"
              "independently tracked actor, troop, and unstaged-member drafts\\n"
              "does not claim that compiled tests have run in an exact-head configured build or that Windows UI evidence exists\\n",
          )'''.replace("          ", "")
          if old not in text:
              raise SystemExit("population editor test fixture changed unexpectedly")
          text = text.replace(old, new, 1)
          anchor = '''    def test_rejects_stale_unit_status(self) -> None:
              path = self.repo_root / "docs/tainted-grail-sdk/ACTOR_TROOP_EDITOR_DESIGN.md"
              text = path.read_text(encoding="utf-8").replace(
                  "6. **Complete**", "6. **Next**"
              )
              path.write_text(text, encoding="utf-8")
              with self.assertRaisesRegex(PopulationEditorContractError, r"6\\. \\*\\*Complete"):
                  validate_population_actor_troop_editor(self.repo_root)
          '''.replace("          ", "")
          addition = anchor + '''
    def test_rejects_fixture_regressed_to_next_work(self) -> None:
        path = self.repo_root / "docs/tainted-grail-sdk/ACTOR_TROOP_EDITOR_DESIGN.md"
        text = path.read_text(encoding="utf-8").replace(
            "7. **Complete** \\u2014 deterministic synthetic population fixture",
            "7. **Next** \\u2014 deterministic synthetic population fixture",
        )
        path.write_text(text, encoding="utf-8")
        with self.assertRaisesRegex(
            PopulationEditorContractError,
            r"7\\. \\*\\*Complete|7\\. \\*\\*Next",
        ):
            validate_population_actor_troop_editor(self.repo_root)
'''
          if anchor not in text:
              raise SystemExit("population editor mutation-test anchor changed unexpectedly")
          tests.write_text(text.replace(anchor, addition, 1), encoding="utf-8")

          docs = Path("docs/tainted-grail-sdk/README.md")
          text = docs.read_text(encoding="utf-8")
          old = "- [Actor and Troop Editor Design](ACTOR_TROOP_EDITOR_DESIGN.md) — approved population design and implementation history. The completed Core, schema-2 persistence, Framework candidate-publication, population-authoring test-source, immutable action-lane, and registered Actor/Troop pane units are recorded here with deterministic fixture, validation, and deferred runtime scope."
          new = "- [Actor and Troop Editor Design](ACTOR_TROOP_EDITOR_DESIGN.md) — approved population design and implementation history with schema-2 persistence, deterministic fixture, immutable action lanes, and the registered Actor/Troop pane; exact-head O3DE configure, build, compiled tests, and Windows evidence remain mandatory before acceptance."
          if old not in text:
              raise SystemExit("documentation-hub population line changed unexpectedly")
          docs.write_text(text.replace(old, new, 1), encoding="utf-8")

          Path(".github/workflows/tainted-grail-sdk-pr-validation.yml").write_text('''name: Tainted Grail SDK PR Static Validation

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - "Gems/TaintedGrailModdingSDK/**"
      - "Gems/ExternalToolchain/**"
      - "Installer/**"
      - "Plugins/**"
      - "Research/**"
      - "TaintedGrailModdingEditor/**"
      - "docs/tainted-grail-sdk/**"
      - "scripts/commit_validation/**"
      - "*.md"
      - ".gitattributes"
      - "o3de.lock.json"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "Gems/TaintedGrailModdingSDK/**"
      - "Gems/ExternalToolchain/**"
      - "Installer/**"
      - "Plugins/**"
      - "Research/**"
      - "TaintedGrailModdingEditor/**"
      - "docs/tainted-grail-sdk/**"
      - "scripts/commit_validation/**"
      - "*.md"
      - ".gitattributes"
      - "o3de.lock.json"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tg-sdk-static-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  static-validation:
    name: Python, validators, and fixtures
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out exact workflow commit
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run non-compiled TG SDK validation layer
        shell: bash
        run: |
          set -o pipefail
          python Gems/TaintedGrailModdingSDK/Tools/run_local_validation.py --keep-going --static-only --skip-source-policy 2>&1 | tee tg-sdk-static-validation.log

      - name: Preserve exact-run validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tg-sdk-static-validation-${{ github.run_id }}
          path: tg-sdk-static-validation.log
          if-no-files-found: error
          retention-days: 7
''', encoding="utf-8")
          PY

          git add \
            .github/workflows/tainted-grail-sdk-pr-validation.yml \
            Gems/TaintedGrailModdingSDK/Tools/validate_population_actor_troop_editor.py \
            Gems/TaintedGrailModdingSDK/Tools/tests/test_validate_population_actor_troop_editor.py \
            docs/tainted-grail-sdk/README.md
          git diff --cached --check
          python -m unittest discover -s Gems/TaintedGrailModdingSDK/Tools/tests -p "test_validate_population_actor_troop_editor.py" -v
          python -m unittest discover -s Gems/TaintedGrailModdingSDK/Tools/tests -p "test_validate_catalog_schema2.py" -v
          python Gems/TaintedGrailModdingSDK/Tools/validate_population_actor_troop_editor.py
          python Gems/TaintedGrailModdingSDK/Tools/validate_catalog_schema2.py
          git commit -s -m "Align merged population validation status"
          git push origin HEAD:agent/harden-validation-pipeline
