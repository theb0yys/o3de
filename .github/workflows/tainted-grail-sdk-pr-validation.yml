name: Tainted Grail SDK PR Static Validation

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - "Gems/TaintedGrailModdingSDK/**"
      - "Gems/ExternalToolchain/**"
      - "Installer/**"
      - "Plugins/**"
      - "Research/**"
      - "TaintedGrailModdingEditor/**"
      - "docs/tainted-grail-sdk/**"
      - "scripts/commit_validation/**"
      - "*.md"
      - ".gitattributes"
      - "o3de.lock.json"
  push:
    branches:
      - main
      - agent/harden-validation-pipeline
    paths:
      - ".github/workflows/**"
      - "Gems/TaintedGrailModdingSDK/**"
      - "Gems/ExternalToolchain/**"
      - "Installer/**"
      - "Plugins/**"
      - "Research/**"
      - "TaintedGrailModdingEditor/**"
      - "docs/tainted-grail-sdk/**"
      - "scripts/commit_validation/**"
      - "*.md"
      - ".gitattributes"
      - "o3de.lock.json"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tg-sdk-static-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  static-validation:
    name: Python, validators, and fixtures
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out exact workflow commit
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 1
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply reviewed one-shot catalog state repair
        if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
        shell: bash
        env:
          REPAIR_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          set -euo pipefail
          python Gems/TaintedGrailModdingSDK/Tools/apply_catalog_schema2_state_repair.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            Gems/TaintedGrailModdingSDK/Tools/validate_catalog_schema2.py \
            Gems/TaintedGrailModdingSDK/Tools/tests/test_validate_catalog_schema2.py \
            docs/tainted-grail-sdk/ACTOR_TROOP_EDITOR_DESIGN.md
          if git diff --cached --quiet; then
            echo "Reviewed catalog state repair is already applied."
          else
            git commit -m "Enforce implemented Actor Troop validation state"
            git push origin "HEAD:${REPAIR_BRANCH}"
          fi

      - name: Run non-compiled TG SDK validation layer
        shell: bash
        run: |
          set -o pipefail
          python Gems/TaintedGrailModdingSDK/Tools/run_local_validation.py --keep-going --static-only --skip-source-policy 2>&1 | tee tg-sdk-static-validation.log

      - name: Preserve exact-run validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tg-sdk-static-validation-${{ github.run_id }}
          path: tg-sdk-static-validation.log
          if-no-files-found: error
          retention-days: 7
