name: FOA-SDK Foundation

# Automatic triggers are intentionally suspended for this host-oriented workflow.
# Pull requests use tainted-grail-sdk-pr-validation.yml; this workflow remains a
# manually dispatched, pinned-O3DE diagnostic and review surface.
on:
  workflow_dispatch:

concurrency:
  group: foa-sdk-foundation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  O3DE_COMMIT: 68683f23fb747380d3efa2424bd5f30242e9c5a2
  O3DE_ROOT: ${{ runner.temp }}/o3de
  FOA_BUILD_ROOT: ${{ runner.temp }}/foa-build

jobs:
  validate-foundation:
    name: Validate standalone FOA-SDK product contracts
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out exact FOA-SDK source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check out exact external O3DE policy surface
        shell: bash
        run: |
          set -euo pipefail
          git clone --filter=blob:none --no-checkout https://github.com/o3de/o3de.git "$O3DE_ROOT"
          git -C "$O3DE_ROOT" sparse-checkout init --no-cone
          printf '/engine.json\n/CMakePresets.json\n/scripts/commit_validation/\n' \
            | git -C "$O3DE_ROOT" sparse-checkout set --stdin
          git -C "$O3DE_ROOT" checkout --detach "$O3DE_COMMIT"
          test "$(git -C "$O3DE_ROOT" rev-parse HEAD)" = "$O3DE_COMMIT"

      - name: Test Developer Preview 0 command layer
        run: python -m unittest discover -s Gems/TaintedGrailModdingSDK/Tools/tests -p "test_developer_preview.py" -v

      - name: Validate Developer Preview 0 command contract
        run: python Gems/TaintedGrailModdingSDK/Tools/validate_developer_preview.py

      - name: Run focused validator regression matrix
        shell: bash
        run: |
          set -euo pipefail
          tests=Gems/TaintedGrailModdingSDK/Tools/tests
          tools=Gems/TaintedGrailModdingSDK/Tools

          echo "Test catalog schema-2 validator"
          python -m unittest discover -s "$tests" -p "test_validate_catalog_schema2.py" -v
          echo "Validate catalog schema-1 migration and schema-2 persistence"
          python "$tools/validate_catalog_schema2.py"

          echo "Test economy coverage dashboard validator"
          python -m unittest discover -s "$tests" -p "test_validate_economy_coverage_dashboard.py" -v
          echo "Validate economy coverage dashboard contract"
          python "$tools/validate_economy_coverage_dashboard.py"

          echo "Test economy duplicate detection validator"
          python -m unittest discover -s "$tests" -p "test_validate_economy_duplicate_detection.py" -v
          echo "Validate economy duplicate detection contract"
          python "$tools/validate_economy_duplicate_detection.py"

          echo "Test adapter contract validator"
          python -m unittest discover -s "$tests" -p "test_validate_adapter_contracts.py" -v
          echo "Validate adapter contract foundation"
          python "$tools/validate_adapter_contracts.py"

          echo "Test adapter work-order plan validator"
          python -m unittest discover -s "$tests" -p "test_validate_adapter_work_order_plans.py" -v
          echo "Validate adapter work-order plan contract"
          python "$tools/validate_adapter_work_order_plans.py"

          echo "Test adapter runtime-result validator"
          python -m unittest discover -s "$tests" -p "test_validate_adapter_runtime_results.py" -v
          echo "Validate adapter runtime-result evidence contract"
          python "$tools/validate_adapter_runtime_results.py"

          echo "Test adapter build-manifest validator"
          python -m unittest discover -s "$tests" -p "test_validate_adapter_build_manifests.py" -v
          echo "Validate adapter build-manifest contract"
          python "$tools/validate_adapter_build_manifests.py"

          echo "Test package-assembly preview validator"
          python -m unittest discover -s "$tests" -p "test_validate_adapter_package_assembly_preview.py" -v
          echo "Validate package-assembly preview contract"
          python "$tools/validate_adapter_package_assembly_preview.py"

          echo "Test staging/deployment preview validator"
          python -m unittest discover -s "$tests" -p "test_validate_adapter_staging_deployment_preview.py" -v
          echo "Validate staging/deployment preview contract"
          python "$tools/validate_adapter_staging_deployment_preview.py"

          echo "Test deployment confirmation/work-order validator"
          python -m unittest discover -s "$tests" -p "test_validate_adapter_deployment_work_orders.py" -v
          echo "Validate deployment confirmation/work-order contract"
          python "$tools/validate_adapter_deployment_work_orders.py"

          echo "Test deployment execution-result validator"
          python -m unittest discover -s "$tests" -p "test_validate_adapter_deployment_execution_results.py" -v
          echo "Validate deployment execution-result evidence contract"
          python "$tools/validate_adapter_deployment_execution_results.py"

      - name: Run authoritative FOA-SDK product validation
        env:
          FOA_O3DE_ROOT: ${{ env.O3DE_ROOT }}
        run: >-
          python Gems/TaintedGrailModdingSDK/Tools/run_local_validation.py
          --engine-root "${{ env.O3DE_ROOT }}"
          --keep-going
          --static-only
