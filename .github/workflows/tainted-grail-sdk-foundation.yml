name: Tainted Grail SDK Foundation

on:
  pull_request:
    paths:
      - "Gems/TaintedGrailModdingSDK/**"
      - "docs/tainted-grail-sdk/**"
      - "AutomatedTesting/project.json"
      - "README.md"
      - "CONTRIBUTING.md"
      - "CODE_OF_CONDUCT.md"
      - "SECURITY.md"
      - "SUPPORT.md"
      - "GOVERNANCE.md"
      - "ROADMAP.md"
      - "CHANGELOG.md"
      - ".github/CODEOWNERS"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - ".github/ISSUE_TEMPLATE/**"
      - "engine.json"
      - ".github/workflows/tainted-grail-sdk-foundation.yml"
  push:
    branches:
      - main
    paths:
      - "Gems/TaintedGrailModdingSDK/**"
      - "docs/tainted-grail-sdk/**"
      - "AutomatedTesting/project.json"
      - "README.md"
      - "CONTRIBUTING.md"
      - "CODE_OF_CONDUCT.md"
      - "SECURITY.md"
      - "SUPPORT.md"
      - "GOVERNANCE.md"
      - "ROADMAP.md"
      - "CHANGELOG.md"
      - ".github/CODEOWNERS"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - ".github/ISSUE_TEMPLATE/**"
      - "engine.json"
      - ".github/workflows/tainted-grail-sdk-foundation.yml"
  workflow_dispatch:

concurrency:
  group: tg-sdk-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-foundation:
    name: Validate TG SDK public foundation and catalog
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Test Core and Framework build-graph validator
        run: >-
          python -m unittest discover
          -s Gems/TaintedGrailModdingSDK/Tools/tests
          -p "test_validate_core_framework_build_graph.py" -v

      - name: Validate Core and Framework build graph
        run: python Gems/TaintedGrailModdingSDK/Tools/validate_core_framework_build_graph.py

      - name: Test economy coverage dashboard validator
        run: >-
          python -m unittest discover
          -s Gems/TaintedGrailModdingSDK/Tools/tests
          -p "test_validate_economy_coverage_dashboard.py" -v

      - name: Validate economy coverage dashboard contract
        run: python Gems/TaintedGrailModdingSDK/Tools/validate_economy_coverage_dashboard.py

      - name: Test economy duplicate detection validator
        run: >-
          python -m unittest discover
          -s Gems/TaintedGrailModdingSDK/Tools/tests
          -p "test_validate_economy_duplicate_detection.py" -v

      - name: Validate economy duplicate detection contract
        run: python Gems/TaintedGrailModdingSDK/Tools/validate_economy_duplicate_detection.py

      - name: Test adapter contract validator
        run: >-
          python -m unittest discover
          -s Gems/TaintedGrailModdingSDK/Tools/tests
          -p "test_validate_adapter_contracts.py" -v

      - name: Validate adapter contract foundation
        run: python Gems/TaintedGrailModdingSDK/Tools/validate_adapter_contracts.py

      - name: Test Developer Preview 0 command layer
        run: python -m unittest discover -s Gems/TaintedGrailModdingSDK/Tools/tests -p "test_developer_preview.py" -v

      - name: Validate Developer Preview 0 command contract
        run: python Gems/TaintedGrailModdingSDK/Tools/validate_developer_preview.py

      - name: Test Developer Preview 0 project integration
        run: >-
          python -m unittest discover
          -s Gems/TaintedGrailModdingSDK/Tools/tests
          -p "test_developer_preview_project.py" -v

      - name: Test Developer Preview 0 project opener
        run: >-
          python -m unittest discover
          -s Gems/TaintedGrailModdingSDK/Tools/tests
          -p "test_developer_preview_open.py" -v

      - name: Test canonical path policy
        run: >-
          python -m unittest discover
          -s Gems/TaintedGrailModdingSDK/Tools/tests
          -p "test_developer_preview_path_policy.py" -v

      - name: Test trusted shortcut generator
        run: >-
          python -m unittest discover
          -s Gems/TaintedGrailModdingSDK/Tools/tests
          -p "test_developer_preview_shortcut.py" -v

      - name: Test trusted clickable entry
        run: >-
          python -m unittest discover
          -s Gems/TaintedGrailModdingSDK/Tools/tests
          -p "test_developer_preview_entry.py" -v

      - name: Validate Developer Preview 0 project integration
        run: python Gems/TaintedGrailModdingSDK/Tools/validate_developer_preview_project.py

      - name: Validate canonical path and executable policy
        run: python Gems/TaintedGrailModdingSDK/Tools/validate_path_policy.py

      - name: Validate atomic workspace and durable schema policy
        run: python Gems/TaintedGrailModdingSDK/Tools/validate_workspace_atomicity_schema.py

      - name: Test Developer Preview 0 fixture
        run: >-
          python -m unittest discover
          -s Gems/TaintedGrailModdingSDK/Tools/tests
          -p "test_developer_preview_fixture.py" -v

      - name: Validate Developer Preview 0 fixture contract
        run: python Gems/TaintedGrailModdingSDK/Tools/validate_developer_preview_fixture.py

      - name: Generate Developer Preview 0 fixture
        run: >-
          python Gems/TaintedGrailModdingSDK/Tools/developer_preview_fixture.py generate
          --output "${{ runner.temp }}/tg-sdk-developer-preview-0-fixture"

      - name: Verify Developer Preview 0 fixture
        run: >-
          python Gems/TaintedGrailModdingSDK/Tools/developer_preview_fixture.py verify
          --output "${{ runner.temp }}/tg-sdk-developer-preview-0-fixture"

      - name: Validate Developer Preview 0 persistence smoke contract
        run: python Gems/TaintedGrailModdingSDK/Tools/validate_developer_preview_smoke.py

      - name: Test Developer Preview 0 launch wrapper
        run: >-
          python -m unittest discover
          -s Gems/TaintedGrailModdingSDK/Tools/tests
          -p "test_developer_preview_launch.py" -v

      - name: Test Developer Preview 0 diagnostics
        run: >-
          python -m unittest discover
          -s Gems/TaintedGrailModdingSDK/Tools/tests
          -p "test_developer_preview_diagnostics.py" -v

      - name: Validate Developer Preview 0 launch and diagnostics contract
        run: python Gems/TaintedGrailModdingSDK/Tools/validate_developer_preview_launch_diagnostics.py

      - name: Collect Developer Preview 0 diagnostics fixture
        run: >-
          python Gems/TaintedGrailModdingSDK/Tools/developer_preview_diagnostics.py collect
          --repo-root .
          --output "${{ runner.temp }}/tg-sdk-developer-preview-0-diagnostics"

      - name: Verify Developer Preview 0 diagnostics fixture
        run: >-
          python Gems/TaintedGrailModdingSDK/Tools/developer_preview_diagnostics.py verify
          --output "${{ runner.temp }}/tg-sdk-developer-preview-0-diagnostics"

      - name: Test Developer Preview 0 manual UI evidence tooling
        run: >-
          python -m unittest discover
          -s Gems/TaintedGrailModdingSDK/Tools/tests
          -p "test_developer_preview_ui_evidence.py" -v

      - name: Validate Developer Preview 0 manual UI evidence contract
        run: python Gems/TaintedGrailModdingSDK/Tools/validate_developer_preview_ui_evidence.py

      - name: Validate foundation and governance contracts
        run: python Gems/TaintedGrailModdingSDK/Tools/validate_foundation.py

      - name: Validate governance hardening contract
        run: python Gems/TaintedGrailModdingSDK/Tools/validate_governance_hardening.py

      - name: Validate catalog test contract
        run: python Gems/TaintedGrailModdingSDK/Tools/validate_catalog_tests.py

      - name: Validate O3DE source policy for SDK Gem
        shell: bash
        run: |
          set -o pipefail
          python -u scripts/commit_validation/validate_file_or_folder.py --path Gems/TaintedGrailModdingSDK 2>&1 \
            | grep -E \
              "(^[A-Za-z].*(PASSED|FAILED)$|^VALIDATION FAILURE SUMMARY$|"\
              "^VALIDATOR_FAILED:|^[0-9]+ (failed|passed))"
