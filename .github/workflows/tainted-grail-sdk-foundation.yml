name: Tainted Grail SDK Foundation

on:
  pull_request:
    paths:
      - "Gems/TaintedGrailModdingSDK/**"
      - "docs/tainted-grail-sdk/**"
      - "README.md"
      - "CONTRIBUTING.md"
      - "CODE_OF_CONDUCT.md"
      - "SECURITY.md"
      - "SUPPORT.md"
      - "GOVERNANCE.md"
      - "ROADMAP.md"
      - "CHANGELOG.md"
      - ".github/CODEOWNERS"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - ".github/ISSUE_TEMPLATE/**"
      - "engine.json"
      - ".github/workflows/tainted-grail-sdk-foundation.yml"
  push:
    branches:
      - main
    paths:
      - "Gems/TaintedGrailModdingSDK/**"
      - "docs/tainted-grail-sdk/**"
      - "README.md"
      - "CONTRIBUTING.md"
      - "CODE_OF_CONDUCT.md"
      - "SECURITY.md"
      - "SUPPORT.md"
      - "GOVERNANCE.md"
      - "ROADMAP.md"
      - "CHANGELOG.md"
      - ".github/CODEOWNERS"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - ".github/ISSUE_TEMPLATE/**"
      - "engine.json"
      - ".github/workflows/tainted-grail-sdk-foundation.yml"
  workflow_dispatch:

concurrency:
  group: tg-sdk-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-foundation:
    name: Validate TG SDK public foundation and catalog
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate foundation and governance contracts
        run: python Gems/TaintedGrailModdingSDK/Tools/validate_foundation.py

      - name: Validate governance hardening contract
        run: python Gems/TaintedGrailModdingSDK/Tools/validate_governance_hardening.py

      - name: Validate catalog test contract
        run: python Gems/TaintedGrailModdingSDK/Tools/validate_catalog_tests.py

      - name: Validate O3DE source policy for SDK Gem
        shell: bash
        run: |
          set -o pipefail
          python -u scripts/commit_validation/validate_file_or_folder.py --path Gems/TaintedGrailModdingSDK 2>&1 \
            | grep -E "(^[A-Za-z].*(PASSED|FAILED)$|^VALIDATION FAILURE SUMMARY$|^VALIDATOR_FAILED:|^[0-9]+ (failed|passed))"
