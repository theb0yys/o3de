name: FOA-SDK build run monitor

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/foa-sdk-run-monitor.yml

permissions:
  actions: read
  contents: write
  issues: write
  pull-requests: write

jobs:
  report:
    runs-on: ubuntu-24.04
    steps:
      - name: Persist failed corrected installer log
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          FAILED_RUN: 30009282134
        shell: bash
        run: |
          set -euo pipefail
          enforce_runs="$(gh run list --repo "$REPOSITORY" --workflow foa-sdk-enforce-and-build.yml --limit 10 --json databaseId,status,conclusion,headSha,headBranch,createdAt,event,displayTitle)"
          canonical_runs="$(gh run list --repo "$REPOSITORY" --workflow tainted-grail-sdk-installer.yml --limit 20 --json databaseId,status,conclusion,headSha,headBranch,createdAt,event,displayTitle)"
          gh run view "$FAILED_RUN" --repo "$REPOSITORY" --log-failed > failed.log 2>&1 || true
          failure_log="$(tail -n 120 failed.log)"
          jq -n \
            --arg generated_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg failure_log "$failure_log" \
            --argjson enforce "$enforce_runs" \
            --argjson canonical "$canonical_runs" \
            '{generated_at:$generated_at,enforce_build_runs:$enforce,canonical_installer_runs:$canonical,corrected_inventory_failure_log:$failure_log}' > status.json
          path='.github/foa-sdk-build-status.json'
          encoded="$(base64 -w0 status.json)"
          existing="$(gh api "repos/$REPOSITORY/contents/$path" --jq .sha)"
          gh api "repos/$REPOSITORY/contents/$path" --method PUT \
            -f message='Record failed corrected installer log' \
            -f content="$encoded" \
            -f sha="$existing" >/dev/null