name: FOA-SDK build run monitor

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/foa-sdk-run-monitor.yml

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: write

jobs:
  report:
    runs-on: ubuntu-24.04
    steps:
      - name: Report installer runs
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          fix_runs="$(gh run list --repo "$REPOSITORY" --workflow foa-sdk-fix-and-build.yml --limit 10 --json databaseId,status,conclusion,headSha,headBranch,createdAt,event,displayTitle)"
          canonical_runs="$(gh run list --repo "$REPOSITORY" --workflow tainted-grail-sdk-installer.yml --limit 20 --json databaseId,status,conclusion,headSha,headBranch,createdAt,event,displayTitle)"
          gh pr comment 180 --repo "$REPOSITORY" --body "Installer correction/build monitor:\n\nFix/build orchestration:\n\`\`\`json\n$fix_runs\n\`\`\`\n\nCanonical installer runs:\n\`\`\`json\n$canonical_runs\n\`\`\`"