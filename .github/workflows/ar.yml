name: AR

run-name: ${{ (github.event_name == 'pull_request' && github.event.pull_request.title || format('AR - {0}', github.ref_name)) }}

on:
  pull_request:
  workflow_dispatch:
    inputs:
      CLEAN_ARTIFACTS:
        description: Use no artifacts for next build (will be saved as clean artifacts)
        type: boolean
        default: false
      android_build:
        description: Build Android
        type: boolean
        default: true
      ios_build:
        description: Build iOS
        type: boolean
        default: true
      linux_build:
        description: Build Linux
        type: boolean
        default: true
      mac_build:
        description: Build Mac
        type: boolean
        default: true
      windows_build:
        description: Build Windows
        type: boolean
        default: true
  push:
    branches:
      - main
      - development
      - hotfix/**
      - point-release/**
      - stabilization/**

env:
  CMAKE_VERSION: &cmake_version "4.2.3"

jobs:
  # The following jobs are used to build the project for the different platforms.
  # The parameters are the following:
  # - compiler: The compiler to use (msvc, clang, gcc)
  # - config: The configuration to use (profile, release). This is defined by presets in ../scripts/build/Platform/<os>/build_config.json
  # - image: The image to use (windows-2022, ubuntu-22.04, macos-15, macos-15-intel). The images are defined from runners images repo: https://github.com/actions/runner-images
  # - platform: The platform to use (Windows, Linux, Mac, Android, iOS)
  # - type: The type of build to use (profile, asset_profile, test_profile, test_cpu_profile, release)
  # - last_artifact: Whether to use the artifact from the last run, from the target branch if it's a pull request or its own branch if it's a push
  # - desktop: Whether to use the desktop environment for tests (Linux only)
  # - msvc_toolset_version: MSVC toolset version to install (Windows only)
  # - msvc_platform_toolset: MSVC platform toolset name, e.g. v143 (Windows only)
  # - clang_version: Clang major version to install (Linux only)
  # - gcc_version: gcc major version to install (Linux only)
  # - ndk_version: Android NDK version to install (Android only)
  # - cmake_version: CMake version constraint to use (all platforms)
  # - gradle_version: Gradle version to use (Android only)

#### Android Build ####
  Android-Profile:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.android_build }}
    uses: ./.github/workflows/android-build.yml
    with:
      compiler: clang
      config: profile
      image: ubuntu-22.04
      platform: Android
      type: profile
      last_artifact: ${{ !inputs.CLEAN_ARTIFACTS }}
      ndk_version: "25.1.8937393"
      gradle_version: "8.12"
      cmake_version: *cmake_version

  Android-Asset:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.android_build }}
    needs: Android-Profile
    uses: ./.github/workflows/android-build.yml
    with:
      compiler: clang
      config: profile
      image: ubuntu-22.04
      platform: Android
      type: asset_profile
      ndk_version: "25.1.8937393"
      gradle_version: "8.12"
      cmake_version: *cmake_version

  Android-Gradle:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.android_build }}
    needs: Android-Asset
    uses: ./.github/workflows/android-build.yml
    with:
      compiler: clang
      config: profile
      image: ubuntu-22.04
      platform: Android
      type: gradle
      ndk_version: "25.1.8937393"
      gradle_version: "8.12"
      cmake_version: *cmake_version

#### iOS Build ####
  iOS-Profile:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.ios_build }}
    uses: ./.github/workflows/ios-build.yml
    with:
      config: profile
      type: profile
      last_artifact: ${{ !inputs.CLEAN_ARTIFACTS }}
      cmake_version: *cmake_version

  iOS-Asset:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.ios_build }}
    needs: iOS-Profile
    uses: ./.github/workflows/ios-build.yml
    with:
      config: profile
      type: asset_profile
      cmake_version: *cmake_version

  iOS-Test:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.ios_build }}
    needs: iOS-Asset
    uses: ./.github/workflows/ios-build.yml
    with:
      config: profile
      type: device_test_profile
      cmake_version: *cmake_version

#### Linux Build ####
  Linux-Profile:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.linux_build }}
    uses: ./.github/workflows/linux-build.yml
    with:
      compiler: clang
      config: profile
      image: ubuntu-22.04
      platform: Linux
      type: profile
      last_artifact: ${{ !inputs.CLEAN_ARTIFACTS }}
      clang_version: "18"
      gcc_version: "13"
      cmake_version: *cmake_version

  Linux-Asset:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.linux_build }}
    needs: Linux-Profile
    uses: ./.github/workflows/linux-build.yml
    with:
      compiler: clang
      config: profile
      image: ubuntu-22.04
      platform: Linux
      type: asset_profile
      clang_version: "18"
      gcc_version: "13"
      cmake_version: *cmake_version

  Linux-Test:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.linux_build }}
    needs: Linux-Asset
    uses: ./.github/workflows/linux-build.yml
    with:
      compiler: clang
      config: profile
      image: ubuntu-22.04
      platform: Linux
      type: test_profile
      desktop: true
      clang_version: "18"
      gcc_version: "13"
      cmake_version: *cmake_version

#### Mac Build ####
  Mac-Profile:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.mac_build }}
    uses: ./.github/workflows/mac-build.yml
    with:
      config: profile
      type: profile
      last_artifact: ${{ !inputs.CLEAN_ARTIFACTS }}
      cmake_version: *cmake_version

  Mac-Asset:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.mac_build }}
    needs: Mac-Profile
    uses: ./.github/workflows/mac-build.yml
    with:
      config: profile
      type: asset_profile
      cmake_version: *cmake_version

  Mac-Test:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.mac_build }}
    needs: Mac-Asset
    uses: ./.github/workflows/mac-build.yml
    with:
      config: profile
      type: test_profile
      cmake_version: *cmake_version

#### Windows Build ####
  Windows-Profile:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.windows_build }}
    uses: ./.github/workflows/windows-build.yml
    with:
      compiler: msvc
      config: profile
      image: windows-2022
      platform: Windows
      type: profile
      last_artifact: ${{ !inputs.CLEAN_ARTIFACTS }} # If CLEAN_ARTIFACTS is false, then this returns true
      msvc_toolset_version: "14.29"
      msvc_platform_toolset: "v142"
      cmake_version: *cmake_version

  Windows-Asset:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.windows_build }}
    needs: Windows-Profile
    uses: ./.github/workflows/windows-build.yml
    with:
      compiler: msvc
      config: profile
      image: windows-2022
      platform: Windows
      type: asset_profile
      msvc_toolset_version: "14.29"
      msvc_platform_toolset: "v142"
      cmake_version: *cmake_version

  Windows-Test:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.windows_build }}
    needs: Windows-Asset
    uses: ./.github/workflows/windows-build.yml
    with:
      compiler: msvc
      config: profile
      image: windows-2022
      platform: Windows
      type: test_cpu_profile
      msvc_toolset_version: "14.29"
      msvc_platform_toolset: "v142"
      cmake_version: *cmake_version

  Windows-Release:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.windows_build }}
    uses: ./.github/workflows/windows-build.yml
    with:
      compiler: msvc
      config: release
      image: windows-2022
      platform: Windows
      type: release
      last_artifact: ${{ !inputs.CLEAN_ARTIFACTS }}
      msvc_toolset_version: "14.29"
      msvc_platform_toolset: "v142"
      cmake_version: *cmake_version
