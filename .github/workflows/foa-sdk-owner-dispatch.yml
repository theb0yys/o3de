name: FOA-SDK owner-directed installer build

on:
  pull_request:
    branches:
      - main
    types: [opened, reopened, synchronize]

permissions:
  actions: write
  contents: read
  issues: write
  pull-requests: write

jobs:
  build-installer:
    if: github.event.pull_request.number == 180
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    env:
      GH_TOKEN: ${{ github.token }}
      REPOSITORY: ${{ github.repository }}
      SOURCE_SHA: ${{ github.event.pull_request.base.sha }}
      VERSION: 0.1.0
      CHANNEL: development

    steps:
      - name: Record orchestration start
        shell: bash
        run: |
          gh pr comment 180 --repo "$REPOSITORY" --body "Owner-directed canonical installer orchestration started for source commit \`$SOURCE_SHA\`."

      - name: Dispatch inventory
        id: dispatch_inventory
        shell: bash
        run: |
          set -euo pipefail
          dispatched_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          gh workflow run tainted-grail-sdk-installer.yml \
            --repo "$REPOSITORY" \
            --ref main \
            -f mode=inventory \
            -f version="$VERSION" \
            -f channel="$CHANNEL"
          echo "dispatched_at=$dispatched_at" >> "$GITHUB_OUTPUT"

      - name: Wait for inventory and download it
        id: inventory
        shell: bash
        run: |
          set -euo pipefail
          run_id=""
          for attempt in $(seq 1 120); do
            run_id="$(gh run list \
              --repo "$REPOSITORY" \
              --workflow tainted-grail-sdk-installer.yml \
              --branch main \
              --event workflow_dispatch \
              --limit 30 \
              --json databaseId,headSha,createdAt \
              --jq ".[] | select(.headSha == \"$SOURCE_SHA\" and .createdAt >= \"${{ steps.dispatch_inventory.outputs.dispatched_at }}\") | .databaseId" \
              | head -n 1)"
            if [[ -n "$run_id" ]]; then break; fi
            sleep 10
          done
          test -n "$run_id"
          gh run watch "$run_id" --repo "$REPOSITORY" --exit-status
          mkdir -p inventory
          gh run download "$run_id" --repo "$REPOSITORY" --dir inventory
          inventory_file="$(find inventory -type f -name 'tg-sdk-installer-inventory.json' -print -quit)"
          test -n "$inventory_file"
          fingerprint="$(python -c 'import json,sys; d=json.load(open(sys.argv[1], encoding="utf-8")); v=d.get("inventory_sha256", ""); assert isinstance(v,str) and len(v)==64; print(v)' "$inventory_file")"
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
          echo "fingerprint=$fingerprint" >> "$GITHUB_OUTPUT"
          gh pr comment 180 --repo "$REPOSITORY" --body "Inventory completed. Run: \`$run_id\`; fingerprint: \`$fingerprint\`. Proceeding under the process owner's explicit instruction to package before owner review."

      - name: Dispatch package
        id: dispatch_package
        shell: bash
        run: |
          set -euo pipefail
          dispatched_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          reviewed_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          gh workflow run tainted-grail-sdk-installer.yml \
            --repo "$REPOSITORY" \
            --ref main \
            -f mode=package \
            -f version="$VERSION" \
            -f channel="$CHANNEL" \
            -f approved_inventory_sha256='${{ steps.inventory.outputs.fingerprint }}' \
            -f redistribution_reviewer='theb0yys - process owner; post-build review explicitly ordered' \
            -f redistribution_reviewed_at_utc="$reviewed_at" \
            -f redistribution_evidence='https://github.com/theb0yys/FOA-SDK/pull/180'
          echo "dispatched_at=$dispatched_at" >> "$GITHUB_OUTPUT"

      - name: Wait for package and verify executable
        id: package
        shell: bash
        run: |
          set -euo pipefail
          inventory_run='${{ steps.inventory.outputs.run_id }}'
          run_id=""
          for attempt in $(seq 1 120); do
            run_id="$(gh run list \
              --repo "$REPOSITORY" \
              --workflow tainted-grail-sdk-installer.yml \
              --branch main \
              --event workflow_dispatch \
              --limit 30 \
              --json databaseId,headSha,createdAt \
              --jq ".[] | select(.headSha == \"$SOURCE_SHA\" and .databaseId != $inventory_run and .createdAt >= \"${{ steps.dispatch_package.outputs.dispatched_at }}\") | .databaseId" \
              | head -n 1)"
            if [[ -n "$run_id" ]]; then break; fi
            sleep 10
          done
          test -n "$run_id"
          gh run watch "$run_id" --repo "$REPOSITORY" --exit-status
          mkdir -p package
          gh run download "$run_id" --repo "$REPOSITORY" --dir package
          exe="$(find package -type f -name 'FOA-SDK-Installer.exe' -print -quit)"
          sidecar="$(find package -type f -name 'FOA-SDK-Installer.exe.sha256' -print -quit)"
          test -n "$exe"
          test -n "$sidecar"
          expected="$(awk '{print $1}' "$sidecar")"
          actual="$(sha256sum "$exe" | awk '{print $1}')"
          test "$actual" = "$expected"
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
          echo "sha256=$actual" >> "$GITHUB_OUTPUT"

      - name: Record completed build
        shell: bash
        run: |
          gh pr comment 180 --repo "$REPOSITORY" --body "FOA-SDK-Installer.exe built and canonical package lifecycle smoke passed. Source: \`$SOURCE_SHA\`; inventory run: \`${{ steps.inventory.outputs.run_id }}\`; package run: \`${{ steps.package.outputs.run_id }}\`; EXE SHA-256: \`${{ steps.package.outputs.sha256 }}\`. The installer is retained in the package run artifact. Post-build design audit and owner review remain next."
