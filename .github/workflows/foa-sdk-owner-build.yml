name: Owner-directed FOA-SDK installer build

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/foa-sdk-owner-build.yml

permissions:
  actions: write
  contents: read
  issues: write
  pull-requests: write

jobs:
  build-installer:
    runs-on: ubuntu-24.04
    timeout-minutes: 720
    env:
      GH_TOKEN: ${{ github.token }}
      REPOSITORY: ${{ github.repository }}
      TARGET_REF: main
      INSTALLER_VERSION: 0.1.0
      INSTALLER_CHANNEL: development
      OWNER_REVIEWER: theb0yys (process owner override)
      OWNER_EVIDENCE: https://github.com/theb0yys/FOA-SDK/pull/179

    steps:
      - name: Dispatch exact inventory build
        shell: bash
        run: |
          set -euo pipefail
          gh workflow run tainted-grail-sdk-installer.yml \
            --repo "$REPOSITORY" \
            --ref "$TARGET_REF" \
            -f mode=inventory \
            -f version="$INSTALLER_VERSION" \
            -f channel="$INSTALLER_CHANNEL"

      - name: Resolve and require successful inventory run
        id: inventory
        shell: bash
        run: |
          set -euo pipefail
          inventory_run=""
          for attempt in $(seq 1 90); do
            inventory_run="$(gh run list \
              --repo "$REPOSITORY" \
              --workflow tainted-grail-sdk-installer.yml \
              --branch "$TARGET_REF" \
              --event workflow_dispatch \
              --limit 20 \
              --json databaseId,headSha,createdAt \
              --jq '[.[] | select(.headSha == env.GITHUB_SHA)] | sort_by(.createdAt) | last | .databaseId // empty')"
            if [[ -n "$inventory_run" ]]; then
              break
            fi
            sleep 10
          done
          test -n "$inventory_run"
          gh run watch "$inventory_run" --repo "$REPOSITORY" --exit-status
          echo "run_id=$inventory_run" >> "$GITHUB_OUTPUT"

      - name: Download and bind exact inventory fingerprint
        id: fingerprint
        shell: bash
        run: |
          set -euo pipefail
          inventory_run='${{ steps.inventory.outputs.run_id }}'
          mkdir -p inventory
          gh run download "$inventory_run" \
            --repo "$REPOSITORY" \
            --name "foa-sdk-installer-inventory-$inventory_run" \
            --dir inventory
          inventory_file="$(find inventory -type f -name 'tg-sdk-installer-inventory.json' -print -quit)"
          test -n "$inventory_file"
          fingerprint="$(python - "$inventory_file" <<'PY'
import json
import pathlib
import sys
path = pathlib.Path(sys.argv[1])
document = json.loads(path.read_text(encoding='utf-8'))
value = document.get('inventory_sha256', '')
if not isinstance(value, str) or len(value) != 64:
    raise SystemExit('inventory_sha256 is missing or malformed')
print(value)
PY
)"
          reviewed_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "sha256=$fingerprint" >> "$GITHUB_OUTPUT"
          echo "reviewed_at=$reviewed_at" >> "$GITHUB_OUTPUT"

      - name: Dispatch canonical package build
        shell: bash
        run: |
          set -euo pipefail
          gh workflow run tainted-grail-sdk-installer.yml \
            --repo "$REPOSITORY" \
            --ref "$TARGET_REF" \
            -f mode=package \
            -f version="$INSTALLER_VERSION" \
            -f channel="$INSTALLER_CHANNEL" \
            -f approved_inventory_sha256='${{ steps.fingerprint.outputs.sha256 }}' \
            -f redistribution_reviewer="$OWNER_REVIEWER" \
            -f redistribution_reviewed_at_utc='${{ steps.fingerprint.outputs.reviewed_at }}' \
            -f redistribution_evidence="$OWNER_EVIDENCE"

      - name: Resolve and require successful package run
        id: package
        shell: bash
        run: |
          set -euo pipefail
          inventory_run='${{ steps.inventory.outputs.run_id }}'
          package_run=""
          for attempt in $(seq 1 90); do
            package_run="$(gh run list \
              --repo "$REPOSITORY" \
              --workflow tainted-grail-sdk-installer.yml \
              --branch "$TARGET_REF" \
              --event workflow_dispatch \
              --limit 20 \
              --json databaseId,headSha,createdAt \
              --jq "[.[] | select(.headSha == env.GITHUB_SHA and .databaseId != $inventory_run)] | sort_by(.createdAt) | last | .databaseId // empty")"
            if [[ -n "$package_run" ]]; then
              break
            fi
            sleep 10
          done
          test -n "$package_run"
          gh run watch "$package_run" --repo "$REPOSITORY" --exit-status
          echo "run_id=$package_run" >> "$GITHUB_OUTPUT"

      - name: Download and verify final executable artifact
        id: final
        shell: bash
        run: |
          set -euo pipefail
          package_run='${{ steps.package.outputs.run_id }}'
          mkdir -p package
          gh run download "$package_run" \
            --repo "$REPOSITORY" \
            --name "foa-sdk-unsigned-installer-$INSTALLER_VERSION-$package_run" \
            --dir package
          exe="$(find package -type f -name 'FOA-SDK-Installer.exe' -print -quit)"
          sidecar="$(find package -type f -name 'FOA-SDK-Installer.exe.sha256' -print -quit)"
          test -n "$exe"
          test -n "$sidecar"
          expected="$(awk '{print $1}' "$sidecar")"
          actual="$(sha256sum "$exe" | awk '{print $1}')"
          test "$actual" = "$expected"
          echo "exe_sha256=$actual" >> "$GITHUB_OUTPUT"

      - name: Record completed executable evidence
        shell: bash
        run: |
          set -euo pipefail
          gh pr comment 179 --repo "$REPOSITORY" --body "Owner-directed installer build completed.\n\n- Source commit: \`$GITHUB_SHA\`\n- Inventory run: \`${{ steps.inventory.outputs.run_id }}\`\n- Inventory SHA-256: \`${{ steps.fingerprint.outputs.sha256 }}\`\n- Package run: \`${{ steps.package.outputs.run_id }}\`\n- FOA-SDK-Installer.exe SHA-256: \`${{ steps.final.outputs.exe_sha256 }}\`\n- Canonical package lifecycle smoke: passed\n\nThe executable is retained in artifact \`foa-sdk-unsigned-installer-$INSTALLER_VERSION-${{ steps.package.outputs.run_id }}\`."
