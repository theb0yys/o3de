name: Tainted Grail Editor Entry

on:
  pull_request:
    paths:
      - "TaintedGrailModdingEditor/**"
      - "AutomatedTesting/project.json"
      - "engine.json"
      - "Gems/TaintedGrailModdingSDK/Tools/developer_preview_open.py"
      - "Gems/TaintedGrailModdingSDK/Tools/developer_preview_shortcut.py"
      - "Gems/TaintedGrailModdingSDK/Tools/validate_developer_preview_project.py"
      - "Gems/TaintedGrailModdingSDK/Tools/tests/test_developer_preview_open.py"
      - "Gems/TaintedGrailModdingSDK/Tools/tests/test_developer_preview_project.py"
      - "Gems/TaintedGrailModdingSDK/Tools/tests/test_developer_preview_shortcut.py"
      - "docs/tainted-grail-sdk/OPEN_AND_TEST_EDITOR.md"
      - ".github/workflows/tainted-grail-editor-entry.yml"
  push:
    branches:
      - main
    paths:
      - "TaintedGrailModdingEditor/**"
      - "AutomatedTesting/project.json"
      - "engine.json"
      - "Gems/TaintedGrailModdingSDK/Tools/developer_preview_open.py"
      - "Gems/TaintedGrailModdingSDK/Tools/developer_preview_shortcut.py"
      - "Gems/TaintedGrailModdingSDK/Tools/validate_developer_preview_project.py"
      - "Gems/TaintedGrailModdingSDK/Tools/tests/test_developer_preview_open.py"
      - "Gems/TaintedGrailModdingSDK/Tools/tests/test_developer_preview_project.py"
      - "Gems/TaintedGrailModdingSDK/Tools/tests/test_developer_preview_shortcut.py"
      - "docs/tainted-grail-sdk/OPEN_AND_TEST_EDITOR.md"
      - ".github/workflows/tainted-grail-editor-entry.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-entry:
    name: Validate dedicated project and clickable entry
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Test dedicated project contract
        run: python -m unittest discover -s Gems/TaintedGrailModdingSDK/Tools/tests -p "test_developer_preview_project.py" -v

      - name: Test dedicated project opener
        run: python -m unittest discover -s Gems/TaintedGrailModdingSDK/Tools/tests -p "test_developer_preview_open.py" -v

      - name: Test Windows shortcut generator
        run: python -m unittest discover -s Gems/TaintedGrailModdingSDK/Tools/tests -p "test_developer_preview_shortcut.py" -v

      - name: Validate dedicated project and clickable entry
        run: python Gems/TaintedGrailModdingSDK/Tools/validate_developer_preview_project.py

      - name: Dry-run Windows shortcut generation
        run: >-
          python Gems/TaintedGrailModdingSDK/Tools/developer_preview_shortcut.py create
          --build-dir build/tg-sdk-developer-preview-0-windows-profile
          --dry-run
