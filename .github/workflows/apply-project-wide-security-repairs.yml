name: Apply project-wide security repairs

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: project-wide-security-repairs-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  apply-and-validate:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.ref == 'agent/project-wide-security-repairs'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Check out exact repair head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || 'agent/project-wide-security-repairs' }}
          fetch-depth: 0
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply reviewed repair bundle
        shell: bash
        run: |
          set +e
          (
            set -euo pipefail
            python -m py_compile Gems/TaintedGrailModdingSDK/Tools/apply_project_wide_security_repairs.py
            python Gems/TaintedGrailModdingSDK/Tools/apply_project_wide_security_repairs.py
            python - <<'PY'
          from pathlib import Path

          validator = Path("Gems/TaintedGrailModdingSDK/Tools/validate_canonical_interchange_compiled_tests.py")
          text = validator.read_text(encoding="utf-8")
          old = 'r"ly_add_target\\(\\s*NAME \\$\\{gem_name\\}\\.CanonicalInterchange\\.Tests.*?\\n\\)",'
          new = 'r"ly_add_target\\(\\s*NAME \\$\\{gem_name\\}\\.CanonicalInterchange\\.Tests.*?\\n\\s*\\)",'
          if text.count(old) != 1:
              raise RuntimeError("Unable to repair the canonical target indentation matcher.")
          validator.write_text(text.replace(old, new), encoding="utf-8")

          test = Path("Gems/TaintedGrailModdingSDK/Tools/tests/test_validate_canonical_interchange_compiled_tests.py")
          text = test.read_text(encoding="utf-8")
          text = text.replace("import sys\n", "import sys\nimport unittest\n", 1)
          old_test = "def test_current_tree_has_core_only_canonical_target() -> None:\n    MODULE.validate(Path(__file__).resolve().parents[4])\n"
          new_test = "class CanonicalInterchangeCompiledTestValidatorTests(unittest.TestCase):\n    def test_current_tree_has_core_only_canonical_target(self) -> None:\n        MODULE.validate(Path(__file__).resolve().parents[4])\n"
          if text.count(old_test) != 1:
              raise RuntimeError("Unable to repair the canonical validator unit-test shape.")
          test.write_text(text.replace(old_test, new_test), encoding="utf-8")

          support = Path("Installer/Tests/Security/security_test_support.py")
          text = support.read_text(encoding="utf-8")
          old_expiry = '            expires_at_utc="2026-07-22T12:20:00Z",\n'
          new_expiry = '            expires_at_utc="2026-07-22T12:15:00Z",\n'
          if text.count(old_expiry) != 1:
              raise RuntimeError("Unable to repair the authority-proof fixture expiry.")
          support.write_text(text.replace(old_expiry, new_expiry), encoding="utf-8")

          publisher = Path("Installer/Bootstrapper/InstallationStatePublisher/Source/installation_state_publisher.py")
          text = publisher.read_text(encoding="utf-8")
          old_publish = '''    target = root / f"{checked['state_reference']}.json"\n    previous = _file_sha256(target)\n'''
          new_publish = '''    target = root / f"{checked['state_reference']}.json"\n    # This read-only preflight gives deterministic replay diagnostics without\n    # replacing the atomic O_EXCL claim that remains the enforcement point.\n    claim_target = (\n        Path(claim_root)\n        / "claim.installation-state-publication-grant"\n        / f"{checked['grant_sha256']}.claim.json"\n    )\n    if claim_target.exists() or claim_target.is_symlink():\n        raise InstallationStatePublisherError(\n            "Publication grant consumption failed: Artifact has already been consumed: "\n            + str(checked["grant_sha256"])\n        )\n    previous = _file_sha256(target)\n'''
          if text.count(old_publish) != 1:
              raise RuntimeError("Unable to add the publication replay preflight.")
          publisher.write_text(text.replace(old_publish, new_publish), encoding="utf-8")
          PY
            git rm Gems/TaintedGrailModdingSDK/Tools/apply_project_wide_security_repairs.py
            git rm -r Gems/TaintedGrailModdingSDK/Tools/project_wide_security_repair_bundle
            git rm .github/workflows/apply-project-wide-security-repairs.yml
          ) 2>&1 | tee project-wide-security-validation.log
          status=${PIPESTATUS[0]}
          exit "$status"

      - name: Compile Python repair surfaces
        shell: bash
        run: |
          set -euo pipefail
          python -m compileall -q \
            Installer/Bootstrapper/Security \
            Installer/Bootstrapper/PackageEngine \
            Installer/Bootstrapper/PackageCopier \
            Installer/Bootstrapper/ProcessLauncher \
            Installer/Bootstrapper/ElevationHelper \
            Installer/Bootstrapper/LifecycleCoordinator \
            Installer/Bootstrapper/InstallationStatePublisher \
            Installer/Tests/Security \
            Gems/TaintedGrailModdingSDK/Tools/validate_canonical_interchange_compiled_tests.py

      - name: Run focused installer security regression tests
        shell: bash
        run: |
          set +e
          (
            set -euo pipefail
            python -m unittest discover \
              -s Gems/TaintedGrailModdingSDK/Tools/tests \
              -p 'test_installer_*.py' \
              -v
          ) 2>&1 | tee -a project-wide-security-validation.log
          status=${PIPESTATUS[0]}
          exit "$status"

      - name: Validate Core-only canonical interchange test contract
        shell: bash
        run: |
          set +e
          (
            set -euo pipefail
            python Gems/TaintedGrailModdingSDK/Tools/validate_canonical_interchange_compiled_tests.py
            python -m unittest \
              Gems.TaintedGrailModdingSDK.Tools.tests.test_validate_canonical_interchange_compiled_tests \
              -v
          ) 2>&1 | tee -a project-wide-security-validation.log
          status=${PIPESTATUS[0]}
          exit "$status"

      - name: Run complete hosted static validation
        shell: bash
        run: |
          set -o pipefail
          python Gems/TaintedGrailModdingSDK/Tools/run_local_validation.py \
            --keep-going \
            --static-only \
            --skip-source-policy 2>&1 | tee -a project-wide-security-validation.log

      - name: Verify reviewed diff
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          git add -A
          git diff --cached --check
          git status --short

      - name: Commit and push validated repairs
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "FOA-SDK Security Repair Bot"
          git config user.email "264552926+theb0yys@users.noreply.github.com"
          git commit -s -m "Harden installer execution trust and Gate 5 contracts"
          git push origin HEAD:agent/project-wide-security-repairs

      - name: Preserve validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: project-wide-security-validation-${{ github.run_id }}
          path: project-wide-security-validation.log
          if-no-files-found: warn
          retention-days: 7
