name: Gate 5 Canonical Interchange Compiled Tests

on:
  pull_request:
    paths:
      - ".github/workflows/gate5-canonical-interchange-compiled.yml"
      - "Gems/TaintedGrailModdingSDK/Code/CMakeLists.txt"
      - "Gems/TaintedGrailModdingSDK/Code/taintedgrailmoddingsdk_canonical_interchange_tests_files.cmake"
      - "Gems/TaintedGrailModdingSDK/Code/Source/CanonicalInterchange*.h"
      - "Gems/TaintedGrailModdingSDK/Code/Source/CanonicalInterchange*.cpp"
      - "Gems/TaintedGrailModdingSDK/Code/Tests/CanonicalInterchange*.h"
      - "Gems/TaintedGrailModdingSDK/Code/Tests/CanonicalInterchange*.cpp"
      - "docs/tainted-grail-sdk/schemas/interchange/v1/**"
      - "o3de.lock.json"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gate5-canonical-interchange-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  exact-head-o3de-build-and-test:
    name: Exact-head O3DE build and canonical interchange tests
    runs-on: windows-2022
    timeout-minutes: 180
    env:
      O3DE_COMMIT: 68683f23fb747380d3efa2424bd5f30242e9c5a2
      BUILD_DIR: ${{ runner.temp }}\foa-gate5-canonical-interchange
      TEST_TARGET: TaintedGrailModdingSDK.CanonicalInterchange.Tests
      TEST_PATTERN: TaintedGrailModdingSDK\.CanonicalInterchange\.Tests
      CONFIGURATION: profile

    steps:
      - name: Check out exact FOA-SDK head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          lfs: true
          persist-credentials: false

      - name: Check out pinned O3DE source
        uses: actions/checkout@v4
        with:
          repository: o3de/o3de
          ref: ${{ env.O3DE_COMMIT }}
          path: o3de
          fetch-depth: 1
          lfs: false
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Record exact inputs
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path "$env:RUNNER_TEMP\gate5-evidence" | Out-Null
          $actualHead = (git rev-parse HEAD).Trim()
          $actualEngine = (git -C "$env:GITHUB_WORKSPACE\o3de" rev-parse HEAD).Trim()
          $expectedHead = "${{ github.event.pull_request.head.sha || github.sha }}"
          if ($actualHead -ne $expectedHead) {
            throw "FOA-SDK head mismatch: expected $expectedHead, found $actualHead"
          }
          if ($actualEngine -ne $env:O3DE_COMMIT) {
            throw "O3DE head mismatch: expected $env:O3DE_COMMIT, found $actualEngine"
          }
          [ordered]@{
            schema_version = 1
            status = "inputs-verified"
            repository_head = $actualHead
            engine_commit = $actualEngine
            target = $env:TEST_TARGET
            configuration = $env:CONFIGURATION
          } | ConvertTo-Json | Set-Content -Encoding utf8 "$env:RUNNER_TEMP\gate5-evidence\inputs.json"

      - name: Configure pinned O3DE project
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          cmake --preset windows-vs-unity `
            -S "$env:GITHUB_WORKSPACE\o3de" `
            -B "$env:BUILD_DIR" `
            -A x64 `
            "-DLY_PROJECTS=$env:GITHUB_WORKSPACE\TaintedGrailModdingEditor"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build Core-only canonical interchange test target
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          cmake --build "$env:BUILD_DIR" `
            --config "$env:CONFIGURATION" `
            --target "$env:TEST_TARGET" `
            --parallel 2
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Run canonical interchange compiled tests
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          ctest --test-dir "$env:BUILD_DIR" `
            -C "$env:CONFIGURATION" `
            --output-on-failure `
            --no-tests=error `
            -R "$env:TEST_PATTERN"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Write exact-head success receipt
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $actualHead = (git rev-parse HEAD).Trim()
          $actualEngine = (git -C "$env:GITHUB_WORKSPACE\o3de" rev-parse HEAD).Trim()
          [ordered]@{
            schema_version = 1
            status = "passed"
            repository_head = $actualHead
            engine_commit = $actualEngine
            target = $env:TEST_TARGET
            test_pattern = $env:TEST_PATTERN
            configuration = $env:CONFIGURATION
            configure_preset = "windows-vs-unity"
            operational_authority = $false
          } | ConvertTo-Json | Set-Content -Encoding utf8 "$env:RUNNER_TEMP\gate5-evidence\receipt.json"

      - name: Preserve exact-head compiled evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate5-canonical-interchange-compiled-${{ github.run_id }}
          if-no-files-found: error
          retention-days: 7
          path: |
            ${{ runner.temp }}\gate5-evidence\*.json
            ${{ env.BUILD_DIR }}\Testing\Temporary\LastTest.log
            ${{ env.BUILD_DIR }}\Testing\Temporary\LastTestsFailed.log
