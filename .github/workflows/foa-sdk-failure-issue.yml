name: FOA-SDK publish failure diagnostics

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/foa-sdk-failure-issue.yml

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  publish:
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ github.token }}
      REPOSITORY: ${{ github.repository }}
      FAILED_JOB_ID: '89127157328'
    steps:
      - name: Publish failed log tail as issue
        shell: bash
        run: |
          set -euo pipefail
          gh api "repos/$REPOSITORY/actions/jobs/$FAILED_JOB_ID/logs" > failed-job.log
          tail -n 240 failed-job.log > failed-tail.log
          {
            echo 'Failed job: 89127157328'
            echo
            echo '```text'
            cat failed-tail.log
            echo '```'
          } > issue.md
          gh issue create --repo "$REPOSITORY" --title 'Installer build failure diagnostics 89127157328' --body-file issue.md
